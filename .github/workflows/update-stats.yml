name: Update NHL Playoff Stats

on:
  # Run every 3 hours during playoff season (April–June)
  schedule:
    - cron: '0 */3 * * *'

  # Also allow triggering manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch NHL playoff stats
        run: python fetch_stats.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --cached --quiet || git commit -m "Auto-update playoff stats $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
